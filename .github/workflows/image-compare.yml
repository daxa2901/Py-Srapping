name: Image Compare Brand Wise

on:
  workflow_dispatch:

jobs:
  prepare:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.set-matrix.outputs.matrix }}

    steps:
      - uses: actions/checkout@v4

      - name: Install deps
        run: pip install -r image_compare/requirements.txt

      - name: Run preprocess
        run: python image_compare/preprocess.py

      - name: Install jq
        run: sudo apt-get update && sudo apt-get install -y jq

      - name: Set matrix
        id: set-matrix
        run: |
          MATRIX=$(jq -c . matrix.json)
          echo "matrix=$MATRIX" >> $GITHUB_OUTPUT

      - name: Upload chunks
        uses: actions/upload-artifact@v4
        with:
          name: chunks
          path: chunks/

  process:
    needs: prepare
    runs-on: ubuntu-latest
    timeout-minutes: 60

    strategy:
      max-parallel: 5
      matrix: ${{ fromJson(needs.prepare.outputs.matrix) }}

    steps:
      - uses: actions/checkout@v4

      - name: Download chunks
        uses: actions/download-artifact@v4
        with:
          name: chunks
          path: chunks

      - name: Install deps
        run: pip install -r image_compare/requirements.txt

      - name: Run script
        run: |
          export INPUT_FILE=${{ matrix.file }}
          python image_compare/script.py

      - name: Upload output
        uses: actions/upload-artifact@v4
        with:
          name: outputs-${{ matrix.brand_id }}
          path: outputs/

  merge:
    needs: process
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Download outputs
        uses: actions/download-artifact@v4
        with:
          path: outputs

      - name: Merge
        run: python image_compare/merge_results.py

      - name: Upload final
        uses: actions/upload-artifact@v4
        with:
          name: final-result
          path: final_output.csv